<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="文字数カウント">
<meta name="theme-color" content="#e07060">
<title>文字数カウント</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #e07060;
  --primary-light: #fdf0ee;
  --primary-mid: #f2ada4;
  --primary-dark: #c4544a;
  --primary-pale: #fff5f3;
  --bg: #fef7f6;
  --card: #ffffff;
  --text: #3d2f2e;
  --text2: #8a7170;
  --text3: #bba8a6;
  --border: #f0ddd9;
  --success: #4a9e6e;
  --success-bg: #eef8f2;
  --success-border: #b8e0c8;
  --warning: #c48a2a;
  --warning-bg: #fef9eb;
  --danger: #c44040;
  --danger-bg: #fef2f2;
  --tag-bg: #fdf0ee;
  --tag-text: #c4544a;
  --shadow: rgba(180,100,90,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  margin: 0 auto;
  overflow-x: hidden;
  padding-bottom: 70px;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px 10px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: 0 1px 6px var(--shadow);
}
.header-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--primary);
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-date {
  font-size: 12px;
  color: var(--text2);
  background: var(--primary-light);
  padding: 4px 10px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.btn-add {
  background: var(--primary);
  color: #fff;
  border: none;
  padding: 8px 16px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: opacity 0.2s;
}
.btn-add:hover { opacity: 0.85; }
.btn-add:active { opacity: 0.7; }

/* Summary stats */
.stats-row {
  display: flex;
  justify-content: space-around;
  padding: 14px 16px 10px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
}
.stat-item { text-align: center; flex: 1; }
.stat-num {
  font-size: 22px;
  font-weight: 700;
  color: var(--primary);
}
.stat-label {
  font-size: 11px;
  color: var(--text2);
  margin-top: 2px;
}

/* Content area */
.content { padding: 12px 16px; }

/* Cards */
.card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: 0 2px 6px var(--shadow);
  cursor: pointer;
  transition: border-color 0.2s;
}
.card:active { border-color: var(--primary-mid); }
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.card-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  flex: 1;
}
.card-chars {
  text-align: right;
  flex-shrink: 0;
  margin-left: 12px;
}
.card-chars-num {
  font-size: 22px;
  font-weight: 700;
  color: var(--primary);
}
.card-chars-label {
  font-size: 11px;
  color: var(--text3);
}
.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 6px;
}
.card-diff {
  font-size: 12px;
  font-weight: 600;
  margin-top: 4px;
}
.card-diff.plus { color: var(--success); }
.card-diff.minus { color: var(--danger); }

/* Badges */
.badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 6px;
}
.badge-logs { background: #f5f0e6; color: #8d6e3f; border: 1px solid #e5d8c0; }

/* Tags */
.tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 8px;
  background: var(--tag-bg);
  color: var(--tag-text);
}

/* Detail view */
.detail-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.detail-back {
  background: none;
  border: none;
  color: var(--primary);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  padding: 0;
  font-family: inherit;
}
.detail-header-actions {
  display: flex;
  gap: 8px;
}
.icon-btn {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--card);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.15s;
  color: var(--text2);
}
.icon-btn:hover { border-color: var(--primary-mid); color: var(--primary); }
.icon-btn.del { color: var(--text3); }
.icon-btn.del:hover { border-color: #f0c0c0; color: var(--danger); background: var(--danger-bg); }
.detail-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.detail-chars {
  font-size: 28px;
  font-weight: 700;
  color: var(--primary);
}
.detail-chars-label {
  font-size: 13px;
  color: var(--text2);
  margin-left: 4px;
}
.detail-actions {
  display: flex;
  gap: 8px;
  margin: 16px 0;
  flex-wrap: wrap;
}
.btn {
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: opacity 0.2s;
  border: none;
}
.btn:hover { opacity: 0.85; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-ghost { background: var(--card); color: var(--text2); border: 1.5px solid var(--border); }
.btn-danger { background: var(--danger-bg); color: var(--danger); border: 1.5px solid #f0c0c0; }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* Section titles */
.section-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: 0.08em;
  margin-bottom: 10px;
  margin-top: 20px;
}

/* Log history */
.log-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 9px 12px;
  border-radius: 8px;
  margin-bottom: 4px;
  font-size: 13px;
}
.log-row:nth-child(odd) { background: var(--card); border: 1px solid var(--border); }
.log-date { color: var(--text2); flex-shrink: 0; }
.log-center { display: flex; align-items: center; gap: 6px; flex: 1; justify-content: center; }
.log-chars { font-weight: 600; color: var(--text); }
.log-diff { font-size: 11px; font-weight: 600; }
.log-diff.plus { color: var(--success); }
.log-diff.minus { color: var(--danger); }
.log-diff.zero { color: var(--text3); }
.log-actions {
  display: flex;
  gap: 2px;
  flex-shrink: 0;
}
.log-action-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 14px;
  padding: 2px 6px;
  border-radius: 6px;
  color: var(--text3);
  transition: all 0.15s;
}
.log-action-btn:hover { color: var(--primary); background: var(--primary-light); }
.log-action-btn.del:hover { color: var(--danger); background: var(--danger-bg); }

/* Summary cards for weekly/monthly */
.summary-cards {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}
.summary-card {
  flex: 1;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  box-shadow: 0 2px 6px var(--shadow);
  text-align: center;
}
.summary-card-label {
  font-size: 11px;
  color: var(--text2);
  margin-bottom: 4px;
}
.summary-card-num {
  font-size: 20px;
  font-weight: 700;
  color: var(--primary);
}
.summary-card-sub {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}

/* Chart container */
.chart-wrap {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  box-shadow: 0 2px 6px var(--shadow);
  margin-bottom: 16px;
  overflow-x: auto;
}
.chart-canvas { width: 100%; }

/* Compare bars */
.compare-item {
  display: flex;
  align-items: center;
  margin-bottom: 12px;
}
.compare-name {
  font-size: 12px;
  color: var(--text);
  width: 100px;
  flex-shrink: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.compare-bar-wrap {
  flex: 1;
  height: 22px;
  background: var(--bg);
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
  margin: 0 10px;
}
.compare-bar {
  height: 100%;
  border-radius: 8px;
  transition: width 0.5s;
}
.compare-chars {
  font-size: 12px;
  font-weight: 700;
  color: var(--text);
  width: 70px;
  text-align: right;
  flex-shrink: 0;
}

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(74,37,37,0.35);
  z-index: 300;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  width: 100%;
  max-width: 400px;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 8px 30px rgba(180,100,90,0.15);
}
.modal-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 18px;
}
.form-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  display: block;
  margin-bottom: 6px;
}
.form-input {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  margin-bottom: 14px;
}
.form-input:focus { border-color: var(--primary-mid); }
.form-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 8px;
}

/* Empty state */
.empty {
  text-align: center;
  padding: 50px 20px;
  color: var(--text3);
}

/* Bottom nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
  box-shadow: 0 -1px 6px var(--shadow);
}
.nav-item {
  flex: 1;
  text-align: center;
  padding: 8px 0 6px;
  cursor: pointer;
  color: var(--text3);
  font-size: 10px;
  font-family: inherit;
  background: none;
  border: none;
  transition: color 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.nav-item.active { color: var(--primary); }
.nav-item svg { width: 22px; height: 22px; }

/* Toast */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: #fff;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 13px;
  z-index: 999;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="app"></div>
<div class="toast" id="toast"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modal-body"></div>
</div>

<script>
// ─── Data ───
const STORAGE_KEY = 'word-count-tracker';
let appData = { works: [], logs: [] };

// ─── IndexedDB ───
const IDB_NAME = 'word-count-tracker-db';
const IDB_STORE = 'backup';
const IDB_KEY = 'appData';

function openIDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = () => { req.result.createObjectStore(IDB_STORE); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveToIDB(data) {
  try {
    const db = await openIDB();
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(JSON.stringify(data), IDB_KEY);
  } catch(e) { console.error('IDB save error:', e); }
}

async function loadFromIDB() {
  try {
    const db = await openIDB();
    return new Promise((resolve) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get(IDB_KEY);
      req.onsuccess = () => {
        if (req.result) resolve(JSON.parse(req.result));
        else resolve(null);
      };
      req.onerror = () => resolve(null);
    });
  } catch(e) { console.error('IDB load error:', e); return null; }
}

// ─── GitHub Gist 保存 ───
const GIST_TOKEN_KEY = 'wct-gist-token';
const GIST_ID_KEY = 'wct-gist-id';
const GIST_FILENAME = 'word-count-tracker-data.json';

function getGistToken() { return localStorage.getItem(GIST_TOKEN_KEY) || ''; }
function getGistId() { return localStorage.getItem(GIST_ID_KEY) || ''; }

function setGistToken(token) {
  localStorage.setItem(GIST_TOKEN_KEY, token);
  saveToIDB({ _gistToken: token, _gistId: getGistId() });
}
function setGistId(id) {
  localStorage.setItem(GIST_ID_KEY, id);
  saveToIDB({ ...appData, _gistToken: getGistToken(), _gistId: id });
}

async function restoreGistCredentials() {
  const idbData = await loadFromIDB();
  if (!idbData) return;
  if (idbData._gistToken && !getGistToken()) {
    localStorage.setItem(GIST_TOKEN_KEY, idbData._gistToken);
  }
  if (idbData._gistId && !getGistId()) {
    localStorage.setItem(GIST_ID_KEY, idbData._gistId);
  }
}

async function findGistByFilename(token) {
  try {
    const res = await fetch('https://api.github.com/gists', {
      cache: 'no-store',
      headers: { 'Authorization': 'token ' + token }
    });
    if (!res.ok) return null;
    const gists = await res.json();
    for (var i = 0; i < gists.length; i++) {
      if (gists[i].files && gists[i].files[GIST_FILENAME]) {
        return gists[i].id;
      }
    }
  } catch(e) { console.error('Gist search error:', e); }
  return null;
}

async function saveToGist() {
  const token = getGistToken();
  if (!token) return;

  var gistId = getGistId();
  if (!gistId) {
    gistId = await findGistByFilename(token);
    if (gistId) setGistId(gistId);
  }

  const payload = { files: {} };
  payload.files[GIST_FILENAME] = { content: JSON.stringify(appData, null, 2) };

  try {
    let res;
    if (gistId) {
      res = await fetch('https://api.github.com/gists/' + gistId, {
        method: 'PATCH',
        cache: 'no-store',
        headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    } else {
      payload.description = '文字数カウント バックアップ';
      payload.public = false;
      res = await fetch('https://api.github.com/gists', {
        method: 'POST',
        cache: 'no-store',
        headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    }
    if (res.ok) {
      const data = await res.json();
      setGistId(data.id);
    } else {
      throw new Error('Gist保存失敗: ' + res.status);
    }
  } catch(e) { console.error('Gist save error:', e); throw e; }
}

async function loadFromGist() {
  const token = getGistToken();
  if (!token) return null;

  var gistId = getGistId();
  if (!gistId) {
    gistId = await findGistByFilename(token);
    if (gistId) setGistId(gistId);
  }
  if (!gistId) return null;

  try {
    const res = await fetch('https://api.github.com/gists/' + gistId, {
      cache: 'no-store',
      headers: { 'Authorization': 'token ' + token }
    });
    if (res.ok) {
      const data = await res.json();
      if (data.files && data.files[GIST_FILENAME]) {
        return JSON.parse(data.files[GIST_FILENAME].content);
      }
    }
  } catch(e) { console.error('Gist load error:', e); }
  return null;
}

// ─── Data ───
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) appData = JSON.parse(raw);
    appData.logs.forEach(l => { if (!l.id) l.id = genId(); });
    saveDataLocal();
  } catch(e) { console.error(e); }

  // まずGist認証情報を復元、その後データ復元
  restoreGistCredentials().then(() => {
    return loadFromIDB();
  }).then(idbData => {
    if (idbData && appData.works.length === 0 && idbData.works && idbData.works.length > 0) {
      appData = idbData;
      appData.logs.forEach(l => { if (!l.id) l.id = genId(); });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
      render();
      showToast('IndexedDBから復元しました');
      return;
    }
    // Gistから復元
    if (appData.works.length === 0 && getGistToken()) {
      loadFromGist().then(gistData => {
        if (gistData && gistData.works && gistData.works.length > 0) {
          appData = gistData;
          appData.logs.forEach(l => { if (!l.id) l.id = genId(); });
          localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
          saveToIDB(appData);
          render();
          showToast('クラウドから復元しました');
        }
      });
    }
  });
}

function saveDataLocal() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
  } catch(e) { console.error(e); }
}

function saveData() {
  saveDataLocal();
  var idbPayload = Object.assign({}, appData, { _gistToken: getGistToken(), _gistId: getGistId() });
  saveToIDB(idbPayload);
  if (appData.works.length > 0 || appData.logs.length > 0) {
    saveToGist();
  }
}

// ─── State ───
let currentTab = 'works';
let selectedWorkId = null;

// ─── Utils ───
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function fmtNum(n) { return (n||0).toLocaleString('ja-JP'); }
function fmtDate(d) { return new Date(d).toLocaleDateString('ja-JP',{month:'short',day:'numeric'}); }
function todayStr() {
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function nowStr() {
  const d=new Date();
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function diffLabel(diff) {
  if (diff > 0) return `<span class="log-diff plus">+${fmtNum(diff)}</span>`;
  if (diff < 0) return `<span class="log-diff minus">${fmtNum(diff)}</span>`;
  return `<span class="log-diff zero">±0</span>`;
}

function cardDiffLabel(diff) {
  if (diff > 0) return `<div class="card-diff plus">前回比 +${fmtNum(diff)}文字</div>`;
  if (diff < 0) return `<div class="card-diff minus">前回比 ${fmtNum(diff)}文字</div>`;
  return '';
}

// 週の開始日（月曜）を取得
function getWeekStart(dateStr) {
  const d = new Date(dateStr);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const monday = new Date(d);
  monday.setDate(diff);
  return monday.toISOString().slice(0,10);
}

const CHART_COLORS = ['#e07060','#4a9e6e','#c48a2a','#7c6db0','#e0927a','#5aada0','#d4a24a','#9a8cc0'];

// ─── 差分計算ヘルパー ───
function getWorkLogs(workId) {
  return appData.logs
    .filter(l => l.workId === workId && !l.episodeId)
    .sort((a,b) => {
      const dc = a.date.localeCompare(b.date);
      if (dc !== 0) return dc;
      return appData.logs.indexOf(a) - appData.logs.indexOf(b);
    });
}

function getLatestChars(workId) {
  const wLogs = getWorkLogs(workId);
  return wLogs.length > 0 ? wLogs[wLogs.length-1].totalChars : 0;
}

function getLastDiff(workId) {
  const wLogs = getWorkLogs(workId);
  if (wLogs.length < 2) return 0;
  return wLogs[wLogs.length-1].totalChars - wLogs[wLogs.length-2].totalChars;
}

// 週間・月間の執筆量を計算
function calcPeriodWritten(workId, periodType) {
  const wLogs = getWorkLogs(workId);
  if (wLogs.length < 1) return 0;

  const today = todayStr();
  let startDate, endDate;

  if (periodType === 'week') {
    startDate = getWeekStart(today);
    endDate = today;
  } else if (periodType === 'month') {
    startDate = today.slice(0,7) + '-01';
    endDate = today;
  } else {
    startDate = today;
    endDate = today;
  }

  const periodLogs = wLogs.filter(l => l.date >= startDate && l.date <= endDate);
  if (periodLogs.length === 0) return 0;

  const beforeLogs = wLogs.filter(l => l.date < startDate);
  const baseline = beforeLogs.length > 0 ? beforeLogs[beforeLogs.length-1].totalChars : 0;
  const latestInPeriod = periodLogs[periodLogs.length-1].totalChars;
  return latestInPeriod - baseline;
}

  const grandTotal = appData.works.reduce((sum, w) => sum + getLatestChars(w.id), 0);

  const totalWritten = appData.works.reduce((sum, w) => {

// ─── Work Detail ───

  const latestTotal = getLatestChars(w.id);

  const weekWritten = calcPeriodWritten(w.id, 'week');
  const monthWritten = calcPeriodWritten(w.id, 'month');

  let html = `
    <div class="detail-header">
      <button class="detail-back" onclick="selectedWorkId=null;render()">← 戻る</button>
      <div class="detail-header-actions">
        <button class="icon-btn" onclick="openEditWorkModal('${w.id}')" title="作品名を編集"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>

      </div>
    </div>
    <div class="detail-title">${esc(w.title)}</div>
    <div style="margin-bottom:4px">
      <span class="detail-chars">${fmtNum(latestTotal)}</span>
      <span class="detail-chars-label">文字</span>
    </div>
    ${lastDiff !== 0 ? `<div class="card-diff ${lastDiff > 0 ? 'plus' : 'minus'}">前回比 ${lastDiff > 0 ? '+' : ''}${fmtNum(lastDiff)}文字</div>` : ''}
    <div style="margin-top:14px">
      <button class="btn btn-primary" onclick="openAddLogModal('${w.id}')">文字数を記録</button>
    </div>`;

  // 週間・月間・今日のサマリー
  const todayWritten = calcPeriodWritten(w.id, 'today');
  if (wLogs.length >= 1) {
    html += `
    <div class="summary-cards">
      <div class="summary-card">
        <div class="summary-card-label">今日</div>
        <div class="summary-card-num">${todayWritten > 0 ? '+' : ''}${fmtNum(todayWritten)}</div>
        <div class="summary-card-sub">文字</div>
      </div>
      <div class="summary-card">
        <div class="summary-card-label">今週</div>
        <div class="summary-card-num">${weekWritten > 0 ? '+' : ''}${fmtNum(weekWritten)}</div>
        <div class="summary-card-sub">文字</div>
      </div>
      <div class="summary-card">
        <div class="summary-card-label">今月</div>
        <div class="summary-card-num">${monthWritten > 0 ? '+' : ''}${fmtNum(monthWritten)}</div>
        <div class="summary-card-sub">文字</div>
      </div>
    </div>`;
  }

  // Chart
  if (wLogs.length > 1) {
    html += '<div class="section-title">文字数推移</div>';
    html += '<div class="chart-wrap"><canvas id="detailChart" class="chart-canvas" height="180"></canvas></div>';
  }

  // Log history with diff and edit/delete
  if (wLogs.length > 0) {
    html += '<div class="section-title">記録履歴</div>';
    const sorted = [...wLogs].reverse();
    sorted.forEach((l, ri) => {
      const origIdx = wLogs.length - 1 - ri;
      const prevLog = origIdx > 0 ? wLogs[origIdx - 1] : null;
      const diff = prevLog ? l.totalChars - prevLog.totalChars : 0;
      const logId = l.id || '';
      html += `<div class="log-row">
        <span class="log-date">${fmtDate(l.date)}</span>
        <span class="log-center">

          <button class="log-action-btn del" onclick="event.stopPropagation();deleteLog('${w.id}','${logId}')" title="削除">×</button>

  setTimeout(() => drawDetailChart(wLogs), 50);
  return html;
}

// ─── Compare ───
function renderCompare() {
  const items = appData.works.map(w => {
    return { title: w.title, chars: getLatestChars(w.id) };
  }).sort((a,b) => b.chars - a.chars);

  if (items.length === 0) return '<div class="empty">比較する作品がありません</div>';

  const maxChars = Math.max(...items.map(i => i.chars), 1);
  let html = '<div class="section-title">作品別文字数</div>';

  items.forEach((item, i) => {
    const pct = (item.chars / maxChars * 100);
    const color = CHART_COLORS[i % CHART_COLORS.length];
    html += `<div class="compare-item">
      <div class="compare-name">${esc(item.title)}</div>
      <div class="compare-bar-wrap"><div class="compare-bar" style="width:${pct}%;background:${color}"></div></div>
      <div class="compare-chars">${fmtNum(item.chars)}</div>
    </div>`;
  });

  return html;
}

        <input class="form-input" type="password" id="f-gist-token" placeholder="ghp_ で始まるトークンを貼り付け" style="margin-bottom:8px">

      </label>
    </div>
    <div style="margin-top:20px;font-size:12px;color:var(--text3);text-align:center">

}

function saveGistToken() {
  const token = document.getElementById('f-gist-token')?.value?.trim();
  if (!token) { showToast('トークンを入力してください'); return; }
  if (!token.startsWith('ghp_')) { showToast('ghp_ で始まるトークンを入力してください'); return; }
  setGistToken(token);
  showToast('保存中...');
  saveToGist().then(() => {
    render();
    showToast('トークンを保存しました');
  }).catch(e => {
    console.error('Gist error:', e);
    showToast('エラー: ' + e.message);
  });
}

function clearGistToken() {
  if (!confirm('トークンを削除しますか？クラウド保存が無効になります。')) return;
  localStorage.removeItem(GIST_TOKEN_KEY);
  localStorage.removeItem(GIST_ID_KEY);
  saveToIDB(appData);
  render();
  showToast('トークンを削除しました');
}

function manualGistSync() {
  saveToGist().then(() => showToast('クラウドに同期しました'));
}

function manualGistRestore() {
  loadFromGist().then(data => {
    if (data && data.works) {
      appData = data;
      appData.logs.forEach(l => { if (!l.id) l.id = genId(); });
      saveDataLocal();
      saveToIDB(appData);
      render();
      showToast('クラウドから復元しました');
    } else {
      showToast('クラウドにデータがありません');
    }
  });
}

function exportData() {
  const blob = new Blob([JSON.stringify(appData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `word-count-tracker-backup-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('バックアップを保存しました');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (imported.works && imported.logs) {
        appData = imported;
        appData.logs.forEach(l => { if (!l.id) l.id = genId(); });
        saveData();
        render();
        showToast('データを読み込みました');
      } else {
        showToast('形式が正しくありません');
      }
    } catch(err) {
      showToast('読み込みに失敗しました');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ─── Chart Drawing (Canvas) ───
function drawDetailChart(logs) {
  const canvas = document.getElementById('detailChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.clientWidth;
  const H = canvas.clientHeight;
  canvas.width = W * 2; canvas.height = H * 2;
  ctx.scale(2, 2);

  const pad = { top: 10, right: 16, bottom: 30, left: 44 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;

  const vals = logs.map(l => l.totalChars);
  const maxVal = Math.max(...vals, 1);

  ctx.strokeStyle = '#f0ddd9'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + ch - (ch * i / 4);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.fillStyle = '#bba8a6'; ctx.font = '10px Hiragino Sans, Meiryo';
    ctx.fillText(`${Math.round(maxVal * i / 4 / 1000)}k`, 4, y + 3);
  }

  ctx.strokeStyle = '#e07060'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round';
  ctx.beginPath();
  logs.forEach((l, i) => {
    const x = pad.left + (cw * i / Math.max(logs.length - 1, 1));
    const y = pad.top + ch - (ch * l.totalChars / maxVal);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  logs.forEach((l, i) => {
    const x = pad.left + (cw * i / Math.max(logs.length - 1, 1));
    const y = pad.top + ch - (ch * l.totalChars / maxVal);
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x, y, 4.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#e07060';
    ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI*2); ctx.fill();
  });

  ctx.fillStyle = '#bba8a6'; ctx.font = '10px Hiragino Sans, Meiryo'; ctx.textAlign = 'center';
  const step = Math.max(1, Math.floor(logs.length / 6));
  logs.forEach((l, i) => {
    if (i % step === 0 || i === logs.length - 1) {
      const x = pad.left + (cw * i / Math.max(logs.length - 1, 1));
      ctx.fillText(fmtDate(l.date), x, H - 6);
    }
  });
}

function drawTimelineChart(allDates) {
  const canvas = document.getElementById('timelineChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.clientWidth;
  const H = canvas.clientHeight;
  canvas.width = W * 2; canvas.height = H * 2;
  ctx.scale(2, 2);

  const pad = { top: 10, right: 16, bottom: 30, left: 44 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;

  const series = appData.works.map(w => {
    return allDates.map(date => {
      const wl = appData.logs.filter(l => l.workId === w.id && !l.episodeId && l.date <= date);
      return wl.length > 0 ? wl[wl.length-1].totalChars : null;
    });
  });

  const allVals = series.flat().filter(v => v !== null);
  const maxVal = Math.max(...allVals, 1);

  ctx.strokeStyle = '#f0ddd9'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + ch - (ch * i / 4);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.fillStyle = '#bba8a6'; ctx.font = '10px Hiragino Sans, Meiryo'; ctx.textAlign = 'left';
    ctx.fillText(`${Math.round(maxVal * i / 4 / 1000)}k`, 4, y + 3);
  }

  series.forEach((s, si) => {
    const color = CHART_COLORS[si % CHART_COLORS.length];
    ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.lineJoin = 'round';
    ctx.beginPath();
    let started = false;
    s.forEach((v, i) => {
      if (v === null) return;
      const x = pad.left + (cw * i / Math.max(allDates.length - 1, 1));
      const y = pad.top + ch - (ch * v / maxVal);
      if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
    });
    ctx.stroke();

    s.forEach((v, i) => {
      if (v === null) return;
      const x = pad.left + (cw * i / Math.max(allDates.length - 1, 1));
      const y = pad.top + ch - (ch * v / maxVal);
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(x, y, 3.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI*2); ctx.fill();
    });
  });

  ctx.fillStyle = '#bba8a6'; ctx.font = '10px Hiragino Sans, Meiryo'; ctx.textAlign = 'center';
  const step = Math.max(1, Math.floor(allDates.length / 6));
  allDates.forEach((d, i) => {
    if (i % step === 0 || i === allDates.length - 1) {
      const x = pad.left + (cw * i / Math.max(allDates.length - 1, 1));
      ctx.fillText(fmtDate(d), x, H - 6);
    }
  });
}

// ─── Modals ───
function openModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal').classList.add('active');
}
function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

function openAddWorkModal() {
  openModal(`
    <div class="modal-title">作品を追加</div>
    <label class="form-label">作品タイトル</label>
    <input class="form-input" id="f-work-title" placeholder="作品名を入力">
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="addWork()">追加</button>
    </div>
  `);
  setTimeout(() => document.getElementById('f-work-title')?.focus(), 100);
}

function addWork() {
  const title = document.getElementById('f-work-title')?.value?.trim();
  if (!title) return;
  appData.works.push({ id: genId(), title, createdAt: todayStr() });
  saveData(); closeModal(); render();
  showToast('作品を追加しました');
}

function openEditWorkModal(workId) {
  const w = appData.works.find(x => x.id === workId);
  if (!w) return;
  openModal(`
    <div class="modal-title">作品名を編集</div>
    <label class="form-label">作品タイトル</label>
    <input class="form-input" id="f-edit-work-title" value="${esc(w.title)}">
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveEditWork('${workId}')">保存</button>
    </div>
  `);
  setTimeout(() => {
    const inp = document.getElementById('f-edit-work-title');
    if (inp) { inp.focus(); inp.select(); }
  }, 100);
}

function saveEditWork(workId) {
  const title = document.getElementById('f-edit-work-title')?.value?.trim();
  if (!title) return;
  const w = appData.works.find(x => x.id === workId);
  if (!w) return;
  w.title = title;
  saveData(); closeModal(); render();
  showToast('作品名を更新しました');
}

function deleteWork(id) {
  if (!confirm('この作品を削除しますか？記録もすべて削除されます。')) return;
  appData.works = appData.works.filter(w => w.id !== id);
  appData.logs = appData.logs.filter(l => l.workId !== id);
  saveData();
  if (selectedWorkId === id) selectedWorkId = null;
  render();
  showToast('削除しました');
}

function openAddLogModal(workId) {
  const w = appData.works.find(x => x.id === workId);
  if (!w) return;

  const latest = getLatestChars(workId);
  const currentInfo = latest > 0 ? '<div style="font-size:13px;color:var(--text);margin-bottom:14px;font-weight:600">現在の累計: ' + fmtNum(latest) + '文字</div>' : '';

  openModal(
    '<div class="modal-title">文字数を記録</div>' +
    '<label class="form-label">日付</label>' +
    '<input class="form-input" type="date" id="f-log-date" value="' + todayStr() + '">' +
    '<label class="form-label">現在の総文字数を入力</label>' +
    currentInfo +
    '<input class="form-input" type="number" id="f-log-chars" placeholder="累計文字数を入力" oninput="updateLogPreview(' + latest + ')">' +
    '<div id="f-log-preview" style="font-size:12px;color:var(--text2);margin-top:-8px;margin-bottom:14px"></div>' +
    '<div class="form-actions">' +
      '<button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>' +
      '<button class="btn btn-primary" onclick="addLog(\'' + workId + '\',' + latest + ')">記録</button>' +
    '</div>'
  );
  setTimeout(function() { var el = document.getElementById('f-log-chars'); if(el) el.focus(); }, 100);
}

function updateLogPreview(prevTotal) {
  var val = parseInt(document.getElementById('f-log-chars')?.value) || 0;
  var preview = document.getElementById('f-log-preview');
  if (preview && val > 0 && prevTotal > 0) {
    var diff = val - prevTotal;
    if (diff > 0) {
      preview.innerHTML = '<span style="color:var(--success);font-weight:600">+' + fmtNum(diff) + '文字</span> の増加';
    } else if (diff < 0) {
      preview.innerHTML = '<span style="color:var(--danger);font-weight:600">' + fmtNum(diff) + '文字</span> の減少';
    } else {
      preview.textContent = '変化なし';
    }
  } else if (preview) {
    preview.textContent = '';
  }
}

function addLog(workId, prevTotal) {
  var date = document.getElementById('f-log-date')?.value || todayStr();
  var newTotal = parseInt(document.getElementById('f-log-chars')?.value) || 0;
  if (newTotal <= 0) { showToast('文字数を入力してください'); return; }

  var diff = newTotal - prevTotal;
  appData.logs.push({ id: genId(), workId: workId, date: date, totalChars: newTotal, episodeId: null });
  saveData(); closeModal(); render();
  if (diff > 0) {
    showToast('+' + fmtNum(diff) + '文字 → 累計' + fmtNum(newTotal) + '文字');
  } else {
    showToast('累計' + fmtNum(newTotal) + '文字で記録しました');
  }
}

// ─── ログの編集 ───
function openEditLogModal(workId, logId) {
  const log = appData.logs.find(l => l.id === logId);
  if (!log) return;

  openModal(`
    <div class="modal-title">記録を編集</div>
    <label class="form-label">日付</label>
    <input class="form-input" type="date" id="f-edit-date" value="${log.date}">
    <label class="form-label">作品全体の文字数</label>
    <input class="form-input" type="number" id="f-edit-chars" value="${log.totalChars}">
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveEditLog('${logId}')">保存</button>
    </div>
  `);
  setTimeout(() => document.getElementById('f-edit-chars')?.focus(), 100);
}

function saveEditLog(logId) {
  const log = appData.logs.find(l => l.id === logId);
  if (!log) return;

  const date = document.getElementById('f-edit-date')?.value || log.date;
  const totalChars = parseInt(document.getElementById('f-edit-chars')?.value) || 0;
  if (totalChars <= 0) { showToast('文字数を入力してください'); return; }

  log.date = date;
  log.totalChars = totalChars;
  saveData(); closeModal(); render();
  showToast('記録を更新しました');
}

// ─── ログの削除 ───
function deleteLog(workId, logId) {
  if (!confirm('この記録を削除しますか？')) return;
  appData.logs = appData.logs.filter(l => l.id !== logId);
  saveData(); render();
  showToast('記録を削除しました');
}

// ─── Service Worker ───
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// ─── Init ───
loadData();
render();
</script>
</body>
